<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solorics | Contact</title>
    <link rel="stylesheet" href="./CSS/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./CSS/media-query.css" />
    <link rel="stylesheet" href="./CSS/animations.css" />
    <link rel="stylesheet" href="./CSS/about.css" />
    <link rel="stylesheet" href="./CSS/contact.css" />
  </head>
  <body>
    <nav>
      <div id="logo"><a href="index.html">Solorics</a></div>
      <div class="nav-links">
        <ul>
          <li><a href="index.html" target="_self">Home</a></li>
          <li><a href="about.html" target="_self">About</a></li>
          <li><a href="contact.html" target="_self">Contact</a></li>
        </ul>
      </div>
      <div class="togglers">
        <i class="fa-solid fa-bars"></i>
        <i class="fa-solid fa-x"></i>
      </div>
    </nav>

    <section class="contact-section">
      <div class="container">
        <!-- Contact Header -->
        <div class="contact-header">
          <h1>Get In Touch</h1>
          <p>
            Have a project in mind or need my services? I'd love to hear from
            you!
          </p>
        </div>

        <!-- Contact Content -->
        <div class="contact-content">
          <!-- Contact Info -->
          <div class="contact-info">
            <div class="contact-item">
              <i class="fa-solid fa-envelope"></i>
              <div>
                <h3>Email</h3>
                <p>opeyemisolomon906@gmail.com</p>
              </div>
            </div>
            <div class="contact-item">
              <i class="fa-solid fa-location-dot"></i>
              <div>
                <h3>Location</h3>
                <p>Lagos, Nigeria</p>
              </div>
            </div>
            <div class="contact-item">
              <i class="fa-brands fa-linkedin"></i>
              <div>
                <h3>LinkedIn</h3>
                <p>linkedin.com/in/solorics</p>
              </div>
            </div>
            <div class="contact-item">
              <i class="fa-brands fa-github"></i>
              <div>
                <h3>GitHub</h3>
                <p>github.com/solotechrics</p>
              </div>
            </div>
          </div>

          <!-- Contact Form -->
          <div class="contact-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                placeholder="Your full name"
                required
              />
              <span class="error" id="name-error"></span>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                placeholder="Your email address"
                required
              />
              <span class="error" id="email-error"></span>
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input
                type="text"
                id="subject"
                placeholder="What is this about?"
              />
              <span class="error" id="subject-error"></span>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                rows="5"
                placeholder="Tell me about your project..."
              ></textarea>
              <span class="error" id="message-error"></span>
            </div>
            <div id="success-message"></div>
            <button class="submit-btn">Send Message</button>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="container">
        <span>&copy; 2026 Solorics&middot;Lagos, Nigeria</span>
      </div>
    </footer>
    <script src="./script.js"></script>
    <script src="./form-validation.js"></script>
  </body>
</html>
